name: CI

on: [pull_request, workflow_dispatch]

# forcer l'encodage utf-8 pour win
env:
  PYTHONUTF8: 1

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install ruff
      - run: ruff check --output-format=github .

  build-and-test:
    name: Build + Pytest (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux_x86_64
            runner: ubuntu-latest
          - os: macos_x86_64
            runner: macos-15-intel
          - os: macos_arm64
            runner: macos-latest
          - os: windows_x86_64
            runner: windows-latest

    steps:
      # -------- Checkout --------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------- Build dependencies --------
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make libopenblas-dev liblapacke-dev
          
          # Crée une arborescence virtuelle pour mapper la syntaxe <openblas/xxxx.h>
          mkdir -p ${{ github.workspace }}/openblas_include/openblas
          CBLAS_PATH=$(find /usr/include -name "cblas.h" | head -n 1)
          LAPACKE_PATH=$(find /usr/include -name "lapacke.h" | head -n 1)
          ln -s "$CBLAS_PATH" ${{ github.workspace }}/openblas_include/openblas/cblas.h
          ln -s "$LAPACKE_PATH" ${{ github.workspace }}/openblas_include/openblas/lapacke.h
          
          echo "C_INCLUDE_PATH=${{ github.workspace }}/openblas_include" >> $GITHUB_ENV

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install make openblas
          
          # Lien symbolique du dossier d'inclusion complet (règle l'erreur du openblas_config.h manquant)
          mkdir -p ${{ github.workspace }}/openblas_include
          ln -s "$(brew --prefix openblas)/include" ${{ github.workspace }}/openblas_include/openblas
          
          echo "C_INCLUDE_PATH=${{ github.workspace }}/openblas_include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$(brew --prefix openblas)/lib" >> $GITHUB_ENV

      - name: Install build deps (Windows / MSYS2)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-make
            mingw-w64-x86_64-openblas

      - name: Configure MSYS2 for native Windows use
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          # Crée un exécutable nommé 'make' à partir de mingw32-make pour que conftest.py le trouve
          cp /mingw64/bin/mingw32-make.exe /mingw64/bin/make.exe
          
          # Astuce de sioux : on crée un lien symbolique récursif 'openblas' dans le dossier include de MSYS2.
          # Ainsi, la syntaxe <openblas/cblas.h> se résoudra naturellement en /mingw64/include/cblas.h !
          ln -sf /mingw64/include /mingw64/include/openblas

      - name: Expose MSYS2 to global PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # On reproduit à l'identique ta configuration locale dans l'environnement global de Windows
          echo "C:\msys64\mingw64\bin" >> $GITHUB_PATH
          echo "C:\msys64\usr\bin" >> $GITHUB_PATH

      # -------- Build --------
      - name: Build libc
        run: make -C libc

      # -------- Python setup --------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # -------- Environment Setup for Tests --------
      - name: Setup Library Paths
        shell: bash
        run: |
          BUILD_DIR="${{ github.workspace }}/libc/build"
          echo "$BUILD_DIR" >> $GITHUB_PATH
          
          if [ "${{ runner.os }}" == "Linux" ]; then
            echo "LD_LIBRARY_PATH=$BUILD_ENV" >> $GITHUB_ENV
          fi
          
          if [ "${{ runner.os }}" == "macOS" ]; then
            OPENBLAS_LIB="$(brew --prefix openblas)/lib"
            echo "DYLD_LIBRARY_PATH=$BUILD_DIR:$OPENBLAS_LIB" >> $GITHUB_ENV
            echo "LD_LIBRARY_PATH=$BUILD_DIR:$OPENBLAS_LIB" >> $GITHUB_ENV
          fi

      # -------- Tests --------
      - name: Run pytest
        run: pytest -v